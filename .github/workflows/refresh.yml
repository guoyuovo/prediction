name: refresh-data
# enabled
# 定时刷新：engine 一条龙 → 提交 static/data/payload.json → App 经 REMOTE_URL 直拉，零云函数。
#   GH runner 在境外 → ESPN/eloratings 可抓；Titan007/红彩 可能被 WAF 拦，沿用上次数值。
on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/refresh.yml'
  schedule:
    - cron: '7,37 * * * *'    # 每小时 UTC 第 7、37 分（避开整点拥堵；北京 = UTC+8，如 08:07/08:37）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 跑一条龙(抓+算+导出 payload.json)
        working-directory: engine
        run: node scripts/daily.mjs

      - name: 提交刷新后的数据
        run: |
          git config user.name  "gh-actions"
          git config user.email "actions@users.noreply.github.com"
          # 同步提交：App 数据 + 引擎中间数据(回测/滚动Elo/赔率等) + 自动校准后的配置(liveMult)
          # 这样仓库与线上一致，本地回测用最新数据，且赛果驱动平局校准能逐日累积收敛。
          # engine/data 中的大文件/瞬时文件已在 .gitignore 排除。
          git add static/data/payload.json engine/data engine/config/model.json
          git diff --cached --quiet || git commit -m "auto: refresh data [skip ci]"
          git push

      - name: 刷新 jsDelivr CDN 缓存（否则 App 最长 12h 拿到旧 payload）
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/static/data/payload.json" \
            && echo "✓ jsDelivr 缓存已刷新" \
            || echo "⚠ purge 请求失败（数据已提交，缓存最长 12h 后自动过期）"

      - name: REMOTE_URL 参考
        run: |
          echo "GitHub jsDelivr（填到 common/api.js REMOTE_URL）："
          echo "https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/static/data/payload.json"
