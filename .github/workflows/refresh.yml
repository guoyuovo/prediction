name: refresh-data
# enabled
# 定时刷新：engine 一条龙 → 提交 static/data/payload.json → App 经 REMOTE_URL 直拉，零云函数。
#   GH runner 在境外 → ESPN/eloratings 可抓；Titan007/红彩 可能被 WAF 拦，沿用上次数值。
on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/refresh.yml'
  schedule:
    - cron: '0 * * * *'          # 每 1 小时(UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 跑一条龙(抓+算+导出 payload.json)
        working-directory: engine
        env:
          PUT_PAYLOAD_URL: ${{ secrets.PUT_PAYLOAD_URL }}
          PUT_SECRET: ${{ secrets.PUT_SECRET }}
        run: node scripts/daily.mjs

      - name: 提交刷新后的数据
        run: |
          git config user.name  "gh-actions"
          git config user.email "actions@users.noreply.github.com"
          git add static/data engine/data
          git diff --cached --quiet || git commit -m "auto: refresh data [skip ci]"
          git push

      - name: REMOTE_URL 参考
        run: |
          echo "GitHub jsDelivr（填到 common/api.js REMOTE_URL）："
          echo "https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/static/data/payload.json"
